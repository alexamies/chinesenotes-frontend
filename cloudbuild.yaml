# Cloud Build pipeline for chinesenotes-frontend
#
# Builds a Docker image with SITE_THEME baked in at build time so that
# Next.js statically pre-rendered pages have the correct theme, then
# deploys to Cloud Run.
#
# Default substitutions target chinesenotes.com.  Override _SITE_THEME and
# _SERVICE_NAME to deploy the ntireader or hbreader variants:
#
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions _SITE_THEME=ntireader,_SERVICE_NAME=ntireader-frontend,_TEXT_BUCKET=my-bucket,_FULLTEXT_API_URL=http://ntireader.org/findadvanced/ .
#
# _TEXT_BUCKET and _FULLTEXT_API_URL are optional on re-deploys: if omitted,
# the existing Cloud Run values are preserved.  Set them once (manually or via
# substitution) and they persist across future deploys that omit them.
# If _FULLTEXT_API_URL is never set, the route falls back to a per-theme
# default (e.g. http://ntireader.org/findadvanced/ for ntireader).
#
# Prerequisites before running gcloud builds submit:
#   1. data/dictionary.json must exist locally (run `node scripts/copy-dictionary.mjs`
#      or `npm run build` first — the TSV is not available in Cloud Build).
#   2. The Artifact Registry repository must exist:
#        gcloud artifacts repositories create cloud-run-source-deploy \
#          --repository-format docker --location $_REGION
#   3. The Cloud Build service account needs roles/run.admin and
#      roles/iam.serviceAccountUser to deploy to Cloud Run.

substitutions:
  _SITE_THEME: chinesenotes
  _SERVICE_NAME: chinesenotes-frontend
  _REGION: us-central1
  _AR_REPO: cloud-run-source-deploy
  _RECAPTCHA_SITE_KEY: ""
  _TEXT_BUCKET: ""
  _FULLTEXT_API_URL: ""

steps:
  # Build the Docker image.  SITE_THEME is passed as a build arg so that
  # `next build` pre-renders static pages with the correct theme baked in.
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --build-arg=SITE_THEME=${_SITE_THEME}
      - --build-arg=NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${_RECAPTCHA_SITE_KEY}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest
      - .

  # Push both the versioned tag and :latest to Artifact Registry.
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}

  # Deploy the new image to Cloud Run.  --update-env-vars only touches the
  # vars listed; all other Cloud Run settings (memory, concurrency, etc.)
  # are left as previously configured.
  # TEXT_BUCKET is only added to --update-env-vars when _TEXT_BUCKET is
  # non-empty so that a blank substitution never overwrites an existing value.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push]
    entrypoint: bash
    args:
      - -c
      - |
        ENV_VARS="SITE_THEME=${_SITE_THEME}"
        if [ -n "${_TEXT_BUCKET}" ]; then
          ENV_VARS="$$ENV_VARS,TEXT_BUCKET=${_TEXT_BUCKET}"
        fi
        if [ -n "${_FULLTEXT_API_URL}" ]; then
          ENV_VARS="$$ENV_VARS,FULLTEXT_API_URL=${_FULLTEXT_API_URL}"
        fi
        gcloud run deploy ${_SERVICE_NAME} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --update-env-vars="$$ENV_VARS"

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest
